<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#090B0F">
    <title>Vault</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app">

    <section id="home" class="page active">
        <main class="page-content">

            <div class="balance-card">
                <p class="balance-label">Current Savings</p>
                <h1 id="current-balance">$0.00</h1>

                <div class="overall-progress">
                    <div class="overall-progress-fill"></div>
                </div>

                <p class="progress-label">0% Complete</p>
            </div>

            <div class="action-buttons">
                <button id="deposit-button">
                    <span class="material-symbols-rounded">add</span>
                    Deposit
                </button>

                <button id="withdraw-button">
                    <span class="material-symbols-rounded">remove</span>
                    Withdraw
                </button>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Next Goal</h2>
                </div>
                <div id="next-goal">No goals yet.</div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Recent Activity</h2>
                </div>
                <div id="activity-list"></div>
            </div>

        </main>
    </section>

    <section id="goals" class="page">
        <main class="page-content">

            <div class="page-title">
                <h1>Goals</h1>

                <button id="add-goal-button">
                    <span class="material-symbols-rounded">add</span>
                </button>
            </div>

            <div id="goal-list"></div>

        </main>
    </section>

    <section id="vault" class="page">
        <main class="page-content">

            <div class="page-title">
                <h1>Vault</h1>
            </div>

            <div id="vault-categories"></div>

        </main>
    </section>

    <section id="settings" class="page">
    <main class="page-content">

        <div class="page-title">
            <h1>Settings</h1>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>Data</h2>
            </div>

            <button id="clear-transactions-button" class="danger-button">
                <span class="material-symbols-rounded">delete</span>
                Clear Transactions
            </button>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>About Vault</h2>
            </div>

            <p>Vault v2</p>
        </div>

    </main>
</section>

<nav class="bottom-navigation four-items">

    <button class="nav-item active" data-page="home">
        <span class="material-symbols-rounded">home</span>
        <span>Home</span>
    </button>

    <button class="nav-item" data-page="goals">
        <span class="material-symbols-rounded">flag</span>
        <span>Goals</span>
    </button>

    <button class="nav-item" data-page="vault">
        <span class="material-symbols-rounded">account_balance_wallet</span>
        <span>Vault</span>
    </button>

    <button class="nav-item" data-page="settings">
        <span class="material-symbols-rounded">settings</span>
        <span>Settings</span>
    </button>

</nav>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">

            <div class="modal-header">
                <h2 id="modal-title">Modal</h2>

                <button id="modal-close">
                    <span class="material-symbols-rounded">close</span>
                </button>
            </div>

            <div id="modal-body" class="modal-body"></div>

        </div>
    </div>

</div>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/goals.js"></script>
<script src="js/vault.js"></script>
<script src="js/navigation.js"></script>
<script src="js/pages.js"></script>
<script src="js/modal.js"></script>
<script src="js/transactions.js"></script>
<script src="js/app.js"></script>
<script src="js/transactions.js"></script>

</body>
</html>
